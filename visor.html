<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html, body, #map { height: 100%; margin: 0; background: #f0f0f0; }
    #timestamp {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8); color: #fff; padding: 10px 20px;
      border-radius: 25px; font-family: sans-serif; z-index: 1000;
    }
  </style>
</head>
<body>

  <div id="map"></div>
  <div id="timestamp">Iniciando sistema...</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const SUPABASE_URL = 'https://xvezdemtphqwgjukjhan.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2ZXpkZW10cGhxd2dqdWtqaGFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI4OTQxMTYsImV4cCI6MjA3ODQ3MDExNn0.ayOgM2MIXJiW_q4AbAyQ4KzgiiNEF5o7sQLr2d_oX1E';

    // Obtenemos y limpiamos el token de la URL
    const urlParams = new URLSearchParams(window.location.search);
    let token = urlParams.get('t') ? urlParams.get('t').replace(/['"]+/g, '').trim() : null;

    // Inicializar Mapa
    const map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let polyline = L.polyline([], { color: '#3880ff', weight: 5 }).addTo(map);
    let marker = L.marker([0,0]).addTo(map);
    let firstLoad = true;

    async function update() {
      if (!token) {
        document.getElementById('timestamp').textContent = "Falta parámetro ?t= en la URL";
        return;
      }

      // 1. GENERAMOS EL DESTRUCTOR DE CACHÉ (Milisegundos actuales)
      const cacheBuster = Date.now();

      // 2. CONSTRUIMOS LA URL A LA API REST NATIVA DE SUPABASE
      // Le pedimos explícitamente que nos devuelva hasta 2000 puntos ordenados.
      const url = `${SUPABASE_URL}/rest/v1/public_locations?share_token=eq.${token}&select=lat,lon,updated_at&order=updated_at.asc&limit=2000&_cb=${cacheBuster}`;

      try {
        const response = await fetch(url, {
          method: 'GET',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Cache-Control': 'no-cache'
          }
        });

        if (!response.ok) throw new Error(`Error Supabase: ${response.status}`);

        const data = await response.json();
        
        // --- CHIVATO PARA LA CONSOLA ---
        console.log(`[${new Date().toLocaleTimeString()}] Puntos descargados: ${data.length}`);

        if (data.length === 0) return;

        const coords = data.map(d => [d.lat, d.lon]);
        const lastCoord = coords[coords.length - 1];

        // 3. DIBUJAMOS EN EL MAPA
        polyline.setLatLngs(coords);
        marker.setLatLng(lastCoord);

        if (firstLoad) {
          map.fitBounds(polyline.getBounds(), { padding: [50, 50] });
          firstLoad = false;
        } else {
          map.panTo(lastCoord);
        }

        // 4. ACTUALIZAMOS EL TEXTO EN PANTALLA
        const timeString = new Date(data[data.length - 1].updated_at).toLocaleTimeString();
        document.getElementById('timestamp').textContent = `Actualizado: ${timeString} (${data.length} pts)`;

      } catch (error) {
        console.error("Error en la actualización:", error);
      }
    }

    // Arrancamos el bucle cada 5 segundos
    setInterval(update, 5000);
    update();
  </script>
</body>
</html>
